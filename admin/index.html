<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <!-- Essential Meta Tags -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Dynamic Title and Description - will be replaced by useConstants -->
    <title>{{META_TITLE}}</title>
    <meta name="description" content="{{META_DESCRIPTION}}" />
    <meta name="keywords" content="{{META_KEYWORDS}}" />
    
    <!-- Author and Robots -->
    <meta name="author" content="{{COMPANY_NAME}}" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

<!-- Ensure you have these sizes - Google prefers 48x48 minimum -->
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
<link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" />
<link rel="manifest" href="/site.webmanifest" />


    
    <!-- Open Graph / Facebook - Dynamic content -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{WEBSITE_URL}}" />
    <meta property="og:title" content="{{META_TITLE}}" />
    <meta property="og:description" content="{{META_DESCRIPTION}}" />
    <meta property="og:image" content="{{WEBSITE_URL}}/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="{{COMPANY_NAME}}" />
    
    <!-- Twitter Card - Dynamic content -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{META_TITLE}}" />
    <meta name="twitter:description" content="{{META_DESCRIPTION}}" />
    <meta name="twitter:image" content="{{WEBSITE_URL}}/og-image.jpg" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#6366f1" />
    <meta name="msapplication-TileColor" content="#6366f1" />
    
   <!-- Structured Data - Dynamic content -->
<script type="application/ld+json" id="structured-data">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "{{COMPANY_NAME}}",
  "alternateName": "{{COMPANY_NAME}}",
  "url": "{{WEBSITE_URL}}",
  "logo": "{{LOGO_URL}}",
  "image": "{{WEBSITE_URL}}/og-image.jpg",
  "description": "{{META_DESCRIPTION}}",
  "telephone": "{{PHONE}}",
  "email": "{{EMAIL}}",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "{{ADDRESS}}",
    "addressCountry": "EG"
  },
  "sameAs": ["{{FACEBOOK}}", "{{INSTAGRAM}}", "{{TWITTER}}", "{{LINKEDIN}}"]
}
</script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>


</html>
